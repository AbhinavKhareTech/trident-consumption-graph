name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install PyTorch (CPU only)
        run: |
          pip install torch --index-url https://download.pytorch.org/whl/cpu

      - name: Install PyG
        run: |
          pip install torch-geometric

      - name: Install DGL
        run: |
          pip install dgl -f https://data.dgl.ai/wheels/torch-2.6/repo.html || pip install dgl

      - name: Install remaining dependencies
        run: |
          pip install xgboost scikit-learn pandas numpy
          pip install fastapi uvicorn httpx websockets pydantic python-dotenv structlog
          pip install pytest pytest-asyncio pytest-cov ruff mypy

      - name: Lint with ruff
        run: |
          ruff check src/ tests/

      - name: Type check with mypy
        continue-on-error: true
        run: |
          mypy src/bgi_trident/ --ignore-missing-imports

      - name: Run tests
        env:
          PYTHONPATH: src
        run: |
          pytest tests/ -v --tb=short
